services:
  app:
    image: borisvers/express-app:latest
    ports:
      - "8080:8080"
    container_name: express-app

  watchtower:
    image: containrrr/watchtower
    command: --interval 60 --debug express-app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower
