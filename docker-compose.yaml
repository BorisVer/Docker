services:
  app:
    image: borisvers/express-app:latest
    ports:
      - "3000:8080"
    container_name: express-app

  watchtower:
    image: nickfedor/watchtower
    environment:
      -  WATCHTOWER_POLL_INTERVAL=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower
